  #   build: 
  #     context: .
  #     dockerfile: Dockerfile 
  #   env_file:
  #     - ./src/.env
  #   depends_on:
  #     - db
  #   command: python -m pytest ./tests
  #   volumes:
  #     - .:/code

volumes:
  postgres-data:
  redis-data:
